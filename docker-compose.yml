services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: defacto_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      # Tuning for benchmarks — shared_buffers and work_mem affect
      # query planning and I/O patterns. Vary these to test whether
      # Postgres resources are the bottleneck (claim S6.1).
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command: >
      postgres
      -c shared_buffers=512MB
      -c work_mem=64MB
      -c synchronous_commit=off
      -c max_connections=100
      -c effective_cache_size=2GB
      -c wal_buffers=16MB
      -c max_wal_size=2GB
      -c checkpoint_completion_target=0.9
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d defacto_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: defacto
      MINIO_ROOT_PASSWORD: defactotest
    ports:
      - "9000:9000"

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/defacto_test
    ports:
      - "7687:7687"
      - "7474:7474"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 10
